<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汽车报价单</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

<div class="max-w-3xl mx-auto py-5 px-4">
  <div class="bg-white rounded-xl p-5 shadow mb-5">
    <h1 class="text-xl font-bold text-center mb-4">汽车报价单</h1>

    <div class="grid grid-cols-2 gap-3 mb-3">
      <div>
        <label class="block text-sm mb-1">新车类型</label>
        <select id="carType" class="w-full border p-2 rounded">
          <option value="gas">汽油车</option>
          <option value="ev" selected>新能源车</option>
        </select>
      </div>
      <div>
        <label class="block text-sm mb-1">补贴类型</label>
        <select id="subsidyType" class="w-full border p-2 rounded">
          <option value="none">无补贴</option>
          <option value="scrap">报废更新（国补）</option>
          <option value="replace" selected>置换更新（省补）</option>
          <option value="local">地方补贴（地补）</option>
        </select>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-2 mb-3">
      <div><label class="text-sm block">厂家指导价</label><input type="number" id="guidePrice" class="w-full border p-2" value="109800"></div>
      <div><label class="text-sm block">厂家置换补贴</label><input type="number" id="replaceSub" class="w-full border p-2" value="8000"></div>
      <div><label class="text-sm block">现金优惠</label><input type="number" id="cashDiscount" class="w-full border p-2" value="0"></div>
      <div><label class="text-sm block">保险预估</label><input type="number" id="insurance" class="w-full border p-2" value="6000"></div>
      <div><label class="text-sm block">上牌费</label><input type="number" id="plateFee" class="w-full border p-2" value="200"></div>
      <div><label class="text-sm block">服务费</label><input type="number" id="serviceFee" class="w-full border p-2" value="0"></div>
      <div><label class="text-sm block">延保费用</label><input type="number" id="extendWarranty" class="w-full border p-2" value="0"></div>
    </div>

    <div class="bg-gray-50 p-3 rounded text-sm mt-3">
      <div>开票价：<span id="invoicePrice"></span></div>
      <div>购置税：<span id="taxPrice"></span></div>
      <div>补贴前：<span id="beforeSubTotal"></span></div>
      <div>政策补贴：<span id="policySubsidy"></span></div>
      <div class="font-bold text-red-600">最终落地：<span id="finalTotal"></span></div>
    </div>

    <div class="flex gap-2 mt-4">
      <button id="copyBtn" class="flex-1 bg-blue-600 text-white p-2 rounded">复制报价</button>
      <button id="openSaveModal" class="flex-1 bg-green-600 text-white p-2 rounded">保存报价</button>
    </div>
  </div>

  <div class="bg-white p-5 rounded shadow">
    <div class="flex justify-between items-center mb-2">
      <h3 class="font-bold">历史报价</h3>
      <button id="clearHistory" class="text-xs text-red-500 border px-2 py-0.5 rounded">清空历史</button>
    </div>
    <div id="historyList"></div>
  </div>
</div>

<!-- 弹窗 -->
<div id="saveModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50">
  <div class="bg-white p-5 rounded w-80">
    <h3 class="font-bold mb-2">客户信息</h3>
    <input id="c_name" placeholder="姓名" class="w-full border p-2 mb-2">
    <input id="c_phone" placeholder="电话" class="w-full border p-2 mb-2">
    <input id="c_car" placeholder="车型" class="w-full border p-2 mb-2">
    <div class="flex justify-end gap-2 mt-2">
      <button id="closeModal">取消</button>
      <button id="confirmSave" class="bg-green-600 text-white px-3 py-1 rounded">保存</button>
    </div>
  </div>
</div>

<script>
const els = {
  carType: document.getElementById('carType'),
  subsidyType: document.getElementById('subsidyType'),
  guidePrice: document.getElementById('guidePrice'),
  replaceSub: document.getElementById('replaceSub'),
  cashDiscount: document.getElementById('cashDiscount'),
  insurance: document.getElementById('insurance'),
  plateFee: document.getElementById('plateFee'),
  serviceFee: document.getElementById('serviceFee'),
  extendWarranty: document.getElementById('extendWarranty'),
  invoicePrice: document.getElementById('invoicePrice'),
  taxPrice: document.getElementById('taxPrice'),
  beforeSubTotal: document.getElementById('beforeSubTotal'),
  policySubsidy: document.getElementById('policySubsidy'),
  finalTotal: document.getElementById('finalTotal')
};

function calcSubsidy(a){switch(els.subsidyType.value){case"none":return 0;case"scrap":return els.carType.value==="ev"?Math.min(.12*a,2e4):Math.min(.1*a,15e3);case"replace":return els.carType.value==="ev"?Math.min(.08*a,15e3):Math.min(.06*a,13e3);case"local":return a<1e5?2e3:4e3}return 0}
function calcTax(a){return els.carType.value==="ev"?Math.round(a/11.3/2):Math.round(a/11.3)}
function calcAll(){const a=+els.guidePrice.value||0,b=+els.replaceSub.value||0,c=+els.cashDiscount.value||0,d=+els.insurance.value||0,e=+els.plateFee.value||0,f=+els.serviceFee.value||0,g=+els.extendWarranty.value||0,h=Math.max(0,a-b-c),i=calcTax(h),j=h+i+d+e+f+g,k=calcSubsidy(h),l=Math.max(0,j-k);els.invoicePrice.textContent="¥"+h.toLocaleString(),els.taxPrice.textContent="¥"+i.toLocaleString(),els.beforeSubTotal.textContent="¥"+j.toLocaleString(),els.policySubsidy.textContent="¥"+k.toLocaleString(),els.finalTotal.textContent="¥"+l.toLocaleString()}
document.querySelectorAll("input,select").forEach(a=>a.addEventListener("input",calcAll));
calcAll();

document.getElementById("copyBtn").onclick=()=>{navigator.clipboard.writeText(`落地价：${els.finalTotal.textContent}`).then(()=>alert("已复制"))};

const modal=document.getElementById("saveModal");
document.getElementById("openSaveModal").onclick=()=>modal.classList.remove("hidden");
document.getElementById("closeModal").onclick=()=>modal.classList.add("hidden");

// 历史记录
const HIST_KEY="car_quote_history";
function getHistory(){try{return JSON.parse(localStorage.getItem(HIST_KEY))||[]}catch{return[]}}
function saveHistory(a){const t=getHistory();t.unshift({...a,id:Date.now()}),localStorage.setItem(HIST_KEY,JSON.stringify(t)),renderHistory()}
function clearHistory(){localStorage.removeItem(HIST_KEY);renderHistory()}
function renderHistory(){const t=getHistory(),e=document.getElementById("historyList");if(0===t.length)return void(e.innerHTML="<div class='text-gray-400 py-2 text-center'>暂无历史</div>");e.innerHTML=t.map(a=>`<div class='border-b py-2'><div>${a.customer.name} | ${a.customer.car}</div><div class='text-xs text-gray-500'>${a.customer.phone} | ${a.time}</div><div class='text-right font-bold text-red-600'>${a.final}</div></div>`).join("")}

document.getElementById("clearHistory").onclick=()=>{if(confirm("确定清空所有历史？")) clearHistory()};
renderHistory();

// ==============================================
// ✅ 飞书同步 100% 最终修复版
// ==============================================
async function getFeishuToken() {
  try {
    const res = await fetch("https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        app_id: "cli_a951bdbd57385cc2",
        app_secret: "RtSoQInoB9OGTY0GZxemhbEnTDWBcI0X"
      })
    });
    const data = await res.json();
    return data.tenant_access_token || "";
  } catch (e) {
    return "";
  }
}

async function submitToFeishu(data) {
  const token = await getFeishuToken();
  if (!token) return false;

  const subTypeText = {
    none: "无补贴",
    scrap: "国补(报废)",
    replace: "省补(置换)",
    local: "地补"
  }[data.data.subType] || "无补贴";

  try {
    const res = await fetch("https://open.feishu.cn/open-apis/bitable/v1/apps/F3PnwLnteiMz7Ak4LhHcpjC1nQc/tables/tblDpbaHR7qowqMK/records", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      },
      body: JSON.stringify({
        fields: {
          "客户姓名": data.customer.name,
          "电话": data.customer.phone,
          "车型": data.customer.car,
          "报价时间": data.time,
          "车辆类型": data.data.type === "ev" ? "新能源车" : "汽油车",
          "补贴类型": subTypeText,
          "厂家指导价": Number(data.data.guide),
          "最终落地价": data.final,
          "开票价": els.invoicePrice.textContent,
          "购置税": els.taxPrice.textContent,
          "政策补贴": els.policySubsidy.textContent
        }
      })
    });
    return res.ok;
  } catch (e) {
    return false;
  }
}

// 保存按钮
document.getElementById("confirmSave").onclick = async () => {
  const name = document.getElementById("c_name").value.trim();
  const phone = document.getElementById("c_phone").value.trim();
  const car = document.getElementById("c_car").value.trim();
  if (!name || !phone || !car) return alert("请填写完整");

  const saveData = {
    customer: { name, phone, car },
    time: new Date().toLocaleString(),
    final: els.finalTotal.textContent,
    data: {
      guide: els.guidePrice.value,
      type: els.carType.value,
      subType: els.subsidyType.value
    }
  };

  saveHistory(saveData);
  modal.classList.add("hidden");

  const ok = await submitToFeishu(saveData);
  alert(ok ? "✅ 保存成功，已同步飞书！" : "⚠️ 本地保存成功，飞书同步失败");
};
</script>
</body>
</html>
