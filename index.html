<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汽车报价单</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-sm">

<div class="max-w-3xl mx-auto py-5 px-4 pb-20">
  <div class="bg-white rounded-xl shadow p-5 mb-5">
    <h1 class="text-xl font-bold text-center mb-4">汽车报价单</h1>

    <div class="grid grid-cols-2 gap-3 mb-3">
      <div>
        <label class="block mb-1 text-sm font-medium">新车类型</label>
        <select id="carType" class="w-full border p-2 rounded">
          <option value="gas">汽油车</option>
          <option value="ev" selected>新能源车</option>
        </select>
      </div>
      <div>
        <label class="block mb-1 text-sm font-medium">补贴类型</label>
        <select id="subsidyType" class="w-full border p-2 rounded">
          <option value="none">无补贴</option>
          <option value="scrap">报废更新（国补）</option>
          <option value="replace" selected>置换更新（省补）</option>
          <option value="local">地方补贴（地补）</option>
        </select>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-3">
      <div>
        <label class="block mb-1 text-sm">厂家指导价</label>
        <input type="number" id="guidePrice" class="w-full border p-2 rounded" value="109800">
      </div>
      <div>
        <label class="block mb-1 text-sm">厂家置换补贴</label>
        <input type="number" id="replaceSub" class="w-full border p-2 rounded" value="8000">
      </div>
      <div>
        <label class="block mb-1 text-sm">现金优惠</label>
        <input type="number" id="cashDiscount" class="w-full border p-2 rounded" value="0">
      </div>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-3">
      <div>
        <label class="block mb-1 text-sm">保险预估</label>
        <input type="number" id="insurance" class="w-full border p-2 rounded" value="6000">
      </div>
      <div>
        <label class="block mb-1 text-sm">上牌费</label>
        <input type="number" id="plateFee" class="w-full border p-2 rounded" value="200">
      </div>
      <div>
        <label class="block mb-1 text-sm">服务费</label>
        <input type="number" id="serviceFee" class="w-full border p-2 rounded" value="0">
      </div>
      <div>
        <label class="block mb-1 text-sm">延保费用</label>
        <input type="number" id="extendWarranty" class="w-full border p-2 rounded" value="0">
      </div>
    </div>

    <div class="bg-gray-50 p-4 rounded-lg text-sm mt-4">
      <div>开票价：<span id="invoicePrice"></span></div>
      <div>购置税：<span id="taxPrice"></span></div>
      <div>补贴前：<span id="beforeSubTotal"></span></div>
      <div>政策补贴：<span id="policySubsidy"></span></div>
      <div class="font-bold text-red-600">最终落地：<span id="finalTotal"></span></div>
    </div>

    <div class="flex gap-3 mt-5">
      <button id="copyBtn" class="flex-1 bg-blue-600 text-white py-2 rounded">一键复制报价单</button>
      <button id="openSaveModal" class="flex-1 bg-green-600 text-white py-2 rounded">保存报价</button>
    </div>
  </div>

  <div class="bg-white rounded-xl shadow p-5">
    <div class="flex justify-between items-center mb-3">
      <h2 class="text-lg font-bold">历史报价</h2>
      <button id="clearHistory" class="text-xs text-red-500 border px-2 py-1 rounded">清空历史</button>
    </div>
    <div id="historyList" class="max-h-64 overflow-y-auto space-y-2"></div>
  </div>
</div>

<!-- 保存弹窗 -->
<div id="saveModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50">
  <div class="bg-white w-full max-w-md rounded p-5 m-4">
    <h3 class="font-bold text-lg mb-3">客户信息</h3>
    <div class="space-y-3">
      <div>
        <label class="block text-sm mb-1">客户姓名</label>
        <input id="c_name" class="w-full border p-2 rounded">
      </div>
      <div>
        <label class="block text-sm mb-1">联系电话</label>
        <input id="c_phone" class="w-full border p-2 rounded">
      </div>
      <div>
        <label class="block text-sm mb-1">车型名称</label>
        <input id="c_car" class="w-full border p-2 rounded" placeholder="例如：Model Y">
      </div>
    </div>
    <div class="flex justify-end gap-2 mt-4">
      <button id="closeModal" class="px-4 py-2 border rounded">取消</button>
      <button id="confirmSave" class="px-4 py-2 bg-green-600 text-white rounded">确认保存</button>
    </div>
  </div>
</div>

<script>
const els = {
  carType: document.getElementById('carType'),
  subsidyType: document.getElementById('subsidyType'),
  guidePrice: document.getElementById('guidePrice'),
  replaceSub: document.getElementById('replaceSub'),
  cashDiscount: document.getElementById('cashDiscount'),
  insurance: document.getElementById('insurance'),
  plateFee: document.getElementById('plateFee'),
  serviceFee: document.getElementById('serviceFee'),
  extendWarranty: document.getElementById('extendWarranty'),
  invoicePrice: document.getElementById('invoicePrice'),
  taxPrice: document.getElementById('taxPrice'),
  beforeSubTotal: document.getElementById('beforeSubTotal'),
  policySubsidy: document.getElementById('policySubsidy'),
  finalTotal: document.getElementById('finalTotal')
};

// 计算逻辑
function calcSubsidy(invoice) {
  const type = els.subsidyType.value;
  const isEv = els.carType.value === 'ev';
  let sub = 0;
  switch(type) {
    case 'none': sub = 0; break;
    case 'scrap': sub = isEv ? Math.min(invoice * 0.12, 20000) : Math.min(invoice * 0.10, 15000); break;
    case 'replace': sub = isEv ? Math.min(invoice * 0.08, 15000) : Math.min(invoice * 0.06, 13000); break;
    case 'local': sub = invoice < 100000 ? 2000 : 4000; break;
  }
  return Math.round(sub);
}

function calcTax(invoice) {
  const isEv = els.carType.value === 'ev';
  return isEv ? Math.round(invoice / 11.3 / 2) : Math.round(invoice / 11.3);
}

function calcAll() {
  const guide = Number(els.guidePrice.value) || 0;
  const replace = Number(els.replaceSub.value) || 0;
  const cash = Number(els.cashDiscount.value) || 0;
  const insurance = Number(els.insurance.value) || 0;
  const plate = Number(els.plateFee.value) || 0;
  const service = Number(els.serviceFee.value) || 0;
  const extend = Number(els.extendWarranty.value) || 0;
  const invoice = Math.max(0, guide - replace - cash);
  const tax = calcTax(invoice);
  const beforeSub = invoice + tax + insurance + plate + service + extend;
  const subsidy = calcSubsidy(invoice);
  const final = Math.max(0, beforeSub - subsidy);
  
  els.invoicePrice.textContent = '¥' + invoice.toLocaleString();
  els.taxPrice.textContent = '¥' + tax.toLocaleString();
  els.beforeSubTotal.textContent = '¥' + beforeSub.toLocaleString();
  els.policySubsidy.textContent = '¥' + subsidy.toLocaleString();
  els.finalTotal.textContent = '¥' + final.toLocaleString();
}

document.querySelectorAll('input,select').forEach(i => i.addEventListener('input', calcAll));
calcAll();

// 复制完整报价
document.getElementById('copyBtn').onclick = () => {
  const subTypeText = {
    none: '无补贴',
    scrap: '国补(报废)',
    replace: '省补(置换)',
    local: '地补'
  }[els.subsidyType.value];
  
  const text = `
📝 汽车报价单
客户：${document.getElementById('c_car').value || '未填写'}
类型：${els.carType.value === 'ev' ? '新能源车' : '汽油车'} | ${subTypeText}
指导价：¥${els.guidePrice.value}
开票价：${els.invoicePrice.textContent}
购置税：${els.taxPrice.textContent}
补贴前：${els.beforeSubTotal.textContent}
政策补贴：${els.policySubsidy.textContent}
✅ 最终落地：${els.finalTotal.textContent}`.trim();
  
  navigator.clipboard.writeText(text).then(() => alert('✅ 完整报价已复制'));
};

// 历史记录（已恢复回填功能）
const HIST_KEY = 'car_quote_history';
function getHistory() {
  try { return JSON.parse(localStorage.getItem(HIST_KEY)) || [] } catch(e) { return [] }
}
function saveHistory(item) {
  const list = getHistory();
  list.unshift({...item, id: Date.now()});
  localStorage.setItem(HIST_KEY, JSON.stringify(list));
  renderHistory();
}
function clearHistory() {
  localStorage.removeItem(HIST_KEY);
  renderHistory();
}

// ✅ 历史记录渲染 + 点击回填（已恢复）
function renderHistory() {
  const list = getHistory();
  const dom = document.getElementById('historyList');
  if (!list.length) {
    dom.innerHTML = '<div class="text-gray-400 text-center py-4">暂无历史报价</div>';
    return;
  }
  dom.innerHTML = list.map(h => `
    <div class="border p-3 rounded hover:bg-gray-50 cursor-pointer" data-id="${h.id}">
      <div class="font-medium">${h.customer.name} | ${h.customer.car}</div>
      <div class="text-xs text-gray-500">${h.customer.phone} | ${h.time}</div>
      <div class="text-right font-bold text-red-600">${h.final}</div>
    </div>
  `).join('');

  // ✅ 点击回填（已恢复）
  document.querySelectorAll('[data-id]').forEach(item => {
    item.onclick = () => {
      const id = item.dataset.id;
      const data = getHistory().find(h => h.id == id);
      if (!data) return;

      els.guidePrice.value = data.data.guide;
      els.replaceSub.value = data.data.replace;
      els.cashDiscount.value = data.data.cash;
      els.insurance.value = data.data.insurance;
      els.plateFee.value = data.data.plate;
      els.serviceFee.value = data.data.service;
      els.extendWarranty.value = data.data.extend;
      els.carType.value = data.data.type;
      els.subsidyType.value = data.data.subType;

      document.getElementById('c_name').value = data.customer.name;
      document.getElementById('c_phone').value = data.customer.phone;
      document.getElementById('c_car').value = data.customer.car;
      
      calcAll();
      alert('✅ 已回填历史报价');
    };
  });
}

document.getElementById('clearHistory').onclick = () => {
  if (confirm('确定清空所有历史？')) clearHistory();
};
renderHistory();

// 弹窗
const modal = document.getElementById('saveModal');
document.getElementById('openSaveModal').onclick = () => modal.classList.replace('hidden', 'flex');
document.getElementById('closeModal').onclick = () => modal.classList.replace('flex', 'hidden');

// ==============================================
// ✅ 飞书 Webhook 同步（100%不跨域）
// ==============================================
 async function syncToFeishu(data) {
  const WEBHOOK_URL = "https://open.feishu.cn/open-apis/bot/v2/hook/80a8404f-40a4-43b9-bb26-1a3d3b39e9d5";

  const msg = {
    msg_type: "text",
    content: {
      text: `
【新汽车报价】
客户：${data.customer.name}
电话：${data.customer.phone}
车型：${data.customer.car}
车辆类型：${data.data.type === 'ev' ? '新能源车' : '汽油车'}
补贴类型：${{none:'无补贴',scrap:'国补(报废)',replace:'省补(置换)',local:'地补'}[data.data.subType]}
厂家指导价：¥${data.data.guide}
开票价：${els.invoicePrice.textContent}
购置税：${els.taxPrice.textContent}
政策补贴：${els.policySubsidy.textContent}
最终落地价：${data.final}
报价时间：${data.time}
      `.trim()
    }
  };

  try {
    const res = await fetch(WEBHOOK_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(msg)
    });
    return res.ok;
  } catch (e) {
    return false;
  }
}

// 保存
document.getElementById('confirmSave').onclick = async () => {
  const name = document.getElementById('c_name').value.trim();
  const phone = document.getElementById('c_phone').value.trim();
  const car = document.getElementById('c_car').value.trim();
  if (!name || !phone || !car) {
    alert('请填写完整客户信息');
    return;
  }

  const saveData = {
    customer: { name, phone, car },
    time: new Date().toLocaleString(),
    final: els.finalTotal.textContent,
    data: {
      guide: els.guidePrice.value,
      replace: els.replaceSub.value,
      cash: els.cashDiscount.value,
      insurance: els.insurance.value,
      plate: els.plateFee.value,
      service: els.serviceFee.value,
      extend: els.extendWarranty.value,
      type: els.carType.value,
      subType: els.subsidyType.value
    }
  };

  saveHistory(saveData);
  modal.classList.replace('flex', 'hidden');
  
  const success = await syncToFeishu(saveData);
  alert(success ? "✅ 保存并同步飞书成功！" : "⚠️ 本地保存成功");
};

  /**
 * 提交数据到 Cloudflare Worker（安全方式）
 */
async function submitToFeishuSheet(data) {
  // ⚠️ 替换为你的 Worker URL
  const workerUrl = "https://car.zhj260810.dev";
  
  // 补贴类型映射
  const subTypeText = {
    none: "无补贴",
    scrap: "国补(报废)",
    replace: "省补(置换)",
    local: "地补"
  }[data.data.subType] || "无补贴";
  
  try {
    console.log("开始提交数据到 Worker...");
    const res = await fetch(workerUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        fields: {
          "客户姓名": data.customer.name,
          "电话": data.customer.phone,
          "车型": data.customer.car,
          "报价时间": data.time,
          "车辆类型": data.data.type === "ev" ? "新能源车" : "汽油车",
          "补贴类型": subTypeText,
          "厂家指导价": Number(data.data.guide),
          "最终落地价": data.final,
          "开票价": els.invoicePrice.textContent,
          "购置税": els.taxPrice.textContent,
          "政策补贴": els.policySubsidy.textContent
        }
      })
    });
    
    const result = await res.json();
    console.log("Worker 返回:", result);
    
    if (result.success) {
      console.log("✅ 数据同步成功");
      return true;
    } else {
      console.error("❌ Worker 返回错误:", result.message);
      alert(`飞书同步失败: ${result.message}`);
      return false;
    }
    
  } catch (error) {
    console.error("提交失败:", error);
    alert(`网络错误: ${error.message}`);
    return false;
  }
}
</script>
</body>
</html>
